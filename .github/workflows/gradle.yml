name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582

    - name: Make gradlew executable
      run: chmod +x gradlew

    # 🔥 Устанавливаем Chrome browser
    - name: Install Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y wget gnupg
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    # 🔥 Устанавливаем ChromeDriver
    - name: Install ChromeDriver
      uses: nanasess/setup-chromedriver@v2

    # 🔥 Собираем приложение
    - name: Build application JAR
      run: ./gradlew clean build -x test

    # 🔥 Запускаем приложение в фоне
    - name: Start SUT (System Under Test)
      run: |
        # Ищем jar файл (может быть в build/libs или корневой app-order.jar)
        if [ -f "app-order.jar" ]; then
          echo "Using app-order.jar from root"
          java -jar app-order.jar &
        elif [ -f "build/libs/*.jar" ]; then
          echo "Using JAR from build/libs"
          java -jar build/libs/*.jar &
        else
          echo "JAR file not found!"
          find . -name "*.jar" -type f
          exit 1
        fi
        
        # Ждем запуска приложения (увеличьте время если нужно)
        echo "Waiting for application to start..."
        sleep 15
        
        # Проверяем, что приложение доступно
        echo "Checking if application is running..."
        for i in {1..10}; do
          if curl -s http://localhost:7777 > /dev/null; then
            echo "✅ Application is ready!"
            break
          fi
          echo "Attempt $i: Waiting..."
          sleep 3
        done

    # 🔥 Запускаем тесты с headless Chrome
    - name: Run tests with headless Chrome
      run: ./gradlew test
      env:
        APP_URL: http://localhost:7777

    # 🔥 Останавливаем приложение
    - name: Stop SUT
      if: always()
      run: |
        pkill -f "java -jar" || true
        pkill -f app-order.jar || true

    # 📊 Загружаем отчет о тестах
    - name: Upload test report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-report-${{ github.run_number }}
        path: build/reports/tests/test/
        retention-days: 7

    # 📊 Загружаем логи приложения (если есть)
    - name: Upload application logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: app-logs-${{ github.run_number }}
        path: |
          *.log
          logs/
        retention-days: 7
