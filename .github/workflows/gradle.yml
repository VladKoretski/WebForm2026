name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582

    - name: Make gradlew executable
      run: chmod +x gradlew

    # 🔥 Устанавливаем Chrome автоматически (все зависимости включены)
    - name: Set up Chrome
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable  # или конкретная версия, например '120'

    # 🔥 Собираем приложение
    - name: Build application
      run: ./gradlew clean build -x test

    # 🔥 Запускаем приложение
    - name: Start SUT
      run: |
        # Ищем JAR файл
        JAR_FILE=""
        if [ -f "app-order.jar" ]; then
          JAR_FILE="app-order.jar"
        elif [ -f "build/libs/TestWebFormAuto-1.0-SNAPSHOT.jar" ]; then
          JAR_FILE="build/libs/TestWebFormAuto-1.0-SNAPSHOT.jar"
        else
          JAR_FILE=$(find build/libs -name "*.jar" -type f ! -name "*-javadoc.jar" ! -name "*-sources.jar" | head -1)
        fi
        
        if [ -z "$JAR_FILE" ] || [ ! -f "$JAR_FILE" ]; then
          echo "❌ JAR file not found!"
          find . -name "*.jar" -type f
          exit 1
        fi
        
        echo "✅ Starting: $JAR_FILE"
        java -jar "$JAR_FILE" > app.log 2>&1 &
        
        # Ждем запуска
        echo "Waiting for app..."
        for i in {1..20}; do
          if curl -sf http://localhost:9999 > /dev/null 2>&1; then
            echo "✅ App ready!"
            break
          fi
          sleep 3
        done
        
        # Финальная проверка
        curl -sf http://localhost:9999 || (echo "❌ App failed"; cat app.log; exit 1)

    # 🔥 Запускаем тесты
    - name: Run tests
      run: ./gradlew test -Dapp.url=http://localhost:9999

    # 🔥 Останавливаем приложение
    - name: Stop SUT
      if: always()
      run: pkill -f "java -jar" || true

    # 📊 Артефакты
    - name: Upload test report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-report-${{ github.run_number }}
        path: build/reports/tests/test/
        retention-days: 7
